<body class="bg-background min-h-screen flex items-center justify-center p-container-margin antialiased">
<!-- Suppressed TopAppBar and BottomNavBar as this is a transactional form screen -->
<main class="w-full max-w-[480px]">
<div class="bg-surface-container-lowest rounded-xl shadow-[0_8px_32px_-12px_rgba(0,0,0,0.08)] p-xl w-full flex flex-col gap-lg relative">
<!-- Close Button (Transactional Context) -->
<button class="absolute top-6 right-6 w-10 h-10 flex items-center justify-center rounded-full bg-secondary-fixed/50 hover:bg-secondary-fixed text-on-surface transition-colors duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<!-- Header -->
<div class="flex flex-col gap-sm pt-sm">
<h1 class="font-headline-md text-headline-md text-on-surface">New Album</h1>
<p class="font-body-md text-body-md text-secondary">Create a new collection to organize your saved inspirations.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-lg mt-sm">
<!-- Title Input -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface ml-unit" for="album-title">Title</label>
<input class="w-full bg-secondary-fixed border-none rounded-full px-lg py-4 font-body-md text-body-md text-on-surface placeholder:text-on-secondary-container focus:ring-2 focus:ring-primary-container transition-all duration-200 outline-none" id="album-title" placeholder="e.g. Summer Outfits 2024" type="text"/>
</div>
<!-- Description Input -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface ml-unit" for="album-description">Description <span class="text-secondary font-normal">(Optional)</span></label>
<textarea class="w-full bg-secondary-fixed border-none rounded-DEFAULT px-lg py-4 font-body-md text-body-md text-on-surface placeholder:text-on-secondary-container focus:ring-2 focus:ring-primary-container transition-all duration-200 outline-none resize-none" id="album-description" placeholder="What is this album about?" rows="4"></textarea>
</div>
<!-- Actions -->
<div class="pt-sm flex flex-col gap-md">
<button class="w-full bg-primary-container hover:bg-primary text-on-primary-container font-headline-sm text-headline-sm rounded-full py-4 transition-all duration-200 active:scale-[0.98] shadow-sm" type="button">
                        Submit Request
                    </button>
</div>
</form>
</div>
</main>
</body></html>
