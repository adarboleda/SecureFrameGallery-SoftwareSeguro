<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#ffffff",
                        "background": "#fff8f7",
                        "secondary-fixed": "#e5e2e1",
                        "on-secondary-container": "#656464",
                        "on-primary-fixed-variant": "#930012",
                        "surface-dim": "#f5d2cf",
                        "surface-container-highest": "#fedad7",
                        "surface-variant": "#fedad7",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#c8c6c5",
                        "surface-container-low": "#fff0ef",
                        "primary-fixed-dim": "#ffb3ad",
                        "primary-container": "#e60023",
                        "inverse-primary": "#ffb3ad",
                        "error-container": "#ffdad6",
                        "inverse-surface": "#412b29",
                        "on-surface-variant": "#5e3f3c",
                        "on-tertiary-fixed-variant": "#004b73",
                        "on-surface": "#2a1615",
                        "on-tertiary-container": "#f7f9ff",
                        "on-secondary-fixed": "#1c1b1b",
                        "surface-bright": "#fff8f7",
                        "inverse-on-surface": "#ffedeb",
                        "on-error-container": "#93000a",
                        "secondary-container": "#e5e2e1",
                        "secondary": "#5f5e5e",
                        "surface-container": "#ffe9e7",
                        "primary-fixed": "#ffdad7",
                        "on-background": "#2a1615",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#0079b6",
                        "on-primary-fixed": "#410004",
                        "tertiary": "#005f90",
                        "error": "#ba1a1a",
                        "surface-container-high": "#ffe2df",
                        "outline": "#936e6b",
                        "on-secondary-fixed-variant": "#474646",
                        "surface": "#fff8f7",
                        "primary": "#b7001a",
                        "on-tertiary-fixed": "#001e31",
                        "surface-tint": "#c0001b",
                        "outline-variant": "#e8bcb8",
                        "tertiary-fixed-dim": "#92ccff",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#fff7f6",
                        "tertiary-fixed": "#cce5ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "grid-gutter": "16px",
                        "lg": "24px",
                        "md": "16px",
                        "container-margin": "24px",
                        "sm": "8px",
                        "unit": "4px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "display-lg": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "headline-sm": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "display-lg": ["36px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "label-sm": ["11px", { "lineHeight": "1.2", "fontWeight": "500" }],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex items-center justify-center p-6 antialiased font-['Plus_Jakarta_Sans']">
<!-- Main Registration Card -->
<main class="bg-surface-container-lowest w-full max-w-[480px] rounded-xl shadow-[0_8px_40px_-12px_rgba(0,0,0,0.08)] p-8 md:p-12 flex flex-col items-center">
<!-- Brand / Icon -->
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mb-6 shadow-[0_4px_20px_-4px_rgba(230,0,35,0.4)]">
<span class="material-symbols-outlined text-on-primary-container text-4xl" style="font-variation-settings: 'FILL' 1;">
                temp_preferences_custom
            </span>
</div>
<!-- Headlines -->
<h1 class="font-display-lg text-display-lg text-on-background text-center tracking-tight mb-2">
            Welcome to inspiration
        </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant text-center mb-8">
            Find new ideas to try
        </p>
<!-- Form Elements -->
<form class="w-full flex flex-col gap-md">
<div class="relative">
<input class="w-full bg-secondary-fixed text-on-background font-body-lg text-body-lg rounded-full px-lg py-[18px] border-none focus:ring-2 focus:ring-primary-container focus:bg-surface-container-lowest outline-none transition-all duration-200 placeholder:text-on-secondary-container/70" id="username" placeholder="Username" type="text"/>
</div>
<div class="relative">
<input class="w-full bg-secondary-fixed text-on-background font-body-lg text-body-lg rounded-full px-lg py-[18px] border-none focus:ring-2 focus:ring-primary-container focus:bg-surface-container-lowest outline-none transition-all duration-200 placeholder:text-on-secondary-container/70" id="email" placeholder="Email address" type="email"/>
</div>
<div class="relative">
<input class="w-full bg-secondary-fixed text-on-background font-body-lg text-body-lg rounded-full px-lg py-[18px] border-none focus:ring-2 focus:ring-primary-container focus:bg-surface-container-lowest outline-none transition-all duration-200 placeholder:text-on-secondary-container/70" id="password" placeholder="Password" type="password"/>
</div>
<div class="relative">
<input class="w-full bg-secondary-fixed text-on-background font-body-lg text-body-lg rounded-full px-lg py-[18px] border-none focus:ring-2 focus:ring-primary-container focus:bg-surface-container-lowest outline-none transition-all duration-200 placeholder:text-on-secondary-container/70" id="confirm_password" placeholder="Confirm Password" type="password"/>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary-container font-headline-sm text-headline-sm rounded-full py-[16px] mt-md hover:bg-primary active:scale-[0.98] transition-all duration-200 shadow-sm" type="button">
                Create Account
            </button>
</form>
<!-- Terms & Footer -->
<p class="font-label-sm text-label-sm text-on-surface-variant text-center mt-lg max-w-[280px]">
            By continuing, you agree to our <a class="font-bold hover:text-on-background underline decoration-2 underline-offset-2" href="#">Terms of Service</a> and acknowledge you've read our <a class="font-bold hover:text-on-background underline decoration-2 underline-offset-2" href="#">Privacy Policy</a>.
        </p>
<div class="mt-xl">
<a class="font-label-md text-label-md text-on-background hover:text-primary-container transition-colors font-bold" href="#">
                Already a member? Log in
            </a>
</div>
</main>
</body></html>
