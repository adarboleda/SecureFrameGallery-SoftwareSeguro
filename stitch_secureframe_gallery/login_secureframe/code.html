<body class="bg-background min-h-screen flex items-center justify-center p-container-margin antialiased">
<!-- Main Login Card -->
<main class="w-full max-w-[480px] bg-surface-container-lowest rounded-lg p-xl shadow-[0_8px_40px_-12px_rgba(0,0,0,0.08)] flex flex-col items-center">
<!-- Brand Icon -->
<div class="w-16 h-16 bg-primary-container text-on-primary-container rounded-full flex items-center justify-center mb-lg">
<span class="material-symbols-outlined text-display-lg" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<!-- Headline -->
<h1 class="font-display-lg text-display-lg text-on-surface mb-sm text-center">Welcome back</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl text-center">Find your next inspiration</p>
<!-- Login Form -->
<form class="w-full flex flex-col gap-md">
<!-- Email Input -->
<div class="relative w-full">
<input class="w-full bg-secondary-fixed text-on-secondary-fixed placeholder:text-on-secondary-container rounded-full px-lg py-md border-none focus:ring-2 focus:ring-primary-container focus:bg-surface-container-lowest transition-colors font-body-lg text-body-lg" id="email" placeholder="Email" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="relative w-full">
<input class="w-full bg-secondary-fixed text-on-secondary-fixed placeholder:text-on-secondary-container rounded-full px-lg py-md border-none focus:ring-2 focus:ring-primary-container focus:bg-surface-container-lowest transition-colors font-body-lg text-body-lg" id="password" placeholder="Password" required="" type="password"/>
</div>
<!-- Forgot Password Link -->
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary-container self-start ml-sm mt-xs transition-colors" href="#">
                Forgot your password?
            </a>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary-container rounded-full py-[18px] font-headline-sm text-headline-sm mt-sm hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                Log in
            </button>
</form>
<!-- Divider -->
<div class="flex items-center w-full my-lg">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="px-md font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">OR</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Login -->
<button class="w-full bg-secondary-fixed text-on-secondary-fixed rounded-full py-[16px] font-label-md text-label-md hover:bg-secondary-container active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="button">
            Continue with Google
        </button>
<!-- Footer / Sign Up Link -->
<p class="mt-xl font-body-md text-body-md text-on-surface-variant text-center">
            Not on yet? 
            <a class="font-label-md text-label-md text-on-surface hover:text-primary-container underline decoration-2 underline-offset-4 transition-colors" href="#">Sign up</a>
</p>
</main>
